# GitHub Actions Workflow for Azure Bootstrap Library
# This workflow builds, tests, and publishes the library to PyPI
#
# Publishing Strategy:
# - main branch → Stable releases (e.g., 1.0.0)
# - develop branch → Development releases (e.g., 1.0.0.dev20250121123456)
# - Tags (v*) → Tagged stable releases

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: "3.11"
  PACKAGE_NAME: "azure-bootstrap"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    outputs:
      package-version: ${{ steps.set-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install build twine

      - name: Install package with test dependencies
        run: |
          pip install -e ".[test]"

      - name: Run tests with coverage
        run: |
          pytest test/ --verbose --cov=azure_bootstrap --cov-report=xml --cov-report=html --cov-report=term --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

      - name: Set package version
        id: set-version
        run: |
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            # Get base version from pyproject.toml
            BASE_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            # Create dev version with timestamp
            DEV_VERSION="${BASE_VERSION}.dev$(date +%Y%m%d%H%M%S)"
            echo "Building development version: ${DEV_VERSION}"
            echo "version=${DEV_VERSION}" >> $GITHUB_OUTPUT

            # Update version in pyproject.toml for build
            sed -i "s/version = \".*\"/version = \"${DEV_VERSION}\"/" pyproject.toml

            # Update version in __init__.py for build
            sed -i "s/__version__ = \".*\"/__version__ = \"${DEV_VERSION}\"/" azure_bootstrap/__init__.py

            echo "Updated version to ${DEV_VERSION} for development build"
          else
            BASE_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            echo "Building stable version: ${BASE_VERSION}"
            echo "version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Build wheel and sdist
        run: |
          python -m build

      - name: Validate distribution packages
        run: |
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only publish on push to main or tags (not on PRs or develop)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publishers

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No credentials needed — uses OIDC Trusted Publisher

  publish-dev:
    name: Publish Dev to PyPI
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only publish dev builds on push to develop
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1

  validate-installation:
    name: Validate Installation
    runs-on: ubuntu-latest
    needs: publish
    if: success()

    steps:
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Wait for PyPI indexing
        run: |
          echo "Waiting 15 seconds for PyPI indexing..."
          sleep 15

      - name: Install package from PyPI
        run: |
          pip install ${{ env.PACKAGE_NAME }}

      - name: Verify package imports
        run: |
          python -c "from azure_bootstrap import initialize_application, get_bootstrap_logger; print('Import successful!')"

      - name: Check package version
        run: |
          python -c "import azure_bootstrap; print(f'Version: {azure_bootstrap.__version__}')"

      - name: Installation instructions
        run: |
          echo "=========================================="
          echo "Package validation complete!"
          echo "=========================================="
          echo ""
          echo "Install with:"
          echo "  pip install ${{ env.PACKAGE_NAME }}"
          echo ""
          echo "Or add to requirements.txt:"
          echo "  ${{ env.PACKAGE_NAME }}"
          echo ""
